<head>

  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DHS Fun - Testing26</title>
  <link rel="icon" href="https://www.dentonisd.org/cms/lib/TX21000245/Centricity/Domain/401/DHS_Circle_2016_rgb.png">

  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">

  <!-- CSS -->
  <link rel="stylesheet" href="index.css">

  <style>
    body {
      margin: 0;
      font-family: 'Poppins', sans-serif;
      background-color: #2e2e2e;
      color: white;
      text-align: center;
    }

    header {
      padding: 30px 10px;
    }

    h1 {
      margin: 0;
      font-size: 2.5rem;
    }

    .subtitle {
      font-size: 1.2rem;
      opacity: 0.8;
    }

    .author {
      font-size: 0.9rem;
      opacity: 0.6;
    }

    .announcement {
      background: #444;
      padding: 10px;
      margin: 20px;
      border-radius: 10px;
    }

    .status {
      color: yellow;
      margin-bottom: 20px;
    }

    .games {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-top: 20px;
    }

    .games a {
      text-decoration: none;
      color: white;
      background: #3a3a3a;
      padding: 15px;
      border-radius: 15px;
      width: 120px;
      transition: 0.3s;
    }

    .games img {
      width: 60px;
      height: 60px;
    }

    .games a:hover {
      transform: scale(1.1);
      background: #555;
    }

    .form a {
      display: inline-block;
      margin-top: 30px;
      padding: 12px 20px;
      background: #007bff;
      border-radius: 10px;
      color: white;
      text-decoration: none;
      transition: 0.3s;
    }

    .form a:hover {
      background: #0056b3;
    }
  </style>
</head>
<body>

  <header>
    <h1>Denton High's Fun Site</h1>
    <p class="subtitle">Made by a Student, for Students</p>
    <p class="author">By Kalvin Owens</p>
  </header>

  <section class="announcement">
    Chatlet is back! Request games using the link below.
  </section>

    ⚠️ This website is still a <b>work in progress</b>.
  </section>

    </a>

    </a>

    <a href="https://js-dos.com/games/wolf3d.exe.html" target="_blank">
      <img src="https://www.techspot.com/images2/downloads/topdownload/2016/12/wolfenstein_3d__1992____icon_by_blagoicons-da47090.png">
      <span>Wolfenstein</span>
    </a>

    <a href="https://chatlet.com/dhs" target="_blank">
      <img src="https://chatlet.com/favicon.ico">
      <span>Chatlet</span>
    </a>
  </section>

  <section class="form">

      Request Games
    </a>
  </section>
